<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Effecto Chatbot</title>
</head>

<body style="margin:0; background:#ffffff;">

<script type="module">
import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js";

Chatbot.init({
  chatflowid: "5bba83ca-6791-4d47-a50d-679db5d511c9",
  apiHost: "https://chatbot.nordaiagency.dk",

  theme: {
    button: {
      backgroundColor: "#009ee3",
      right: 20,
      bottom: 20,
      size: 52,
      dragAndDrop: false,
      iconColor: "white",
      customIconSrc: "https://i.imgur.com/EfQPrhF.png",
      autoWindowOpen: {
        autoOpen: true,
        openDelay: 1,
        autoOpenOnMobile: false
      }
    },

    tooltip: {
      showTooltip: true,
      tooltipMessage: "Hej 👋 Har du spørgsmål om SEO?",
      tooltipBackgroundColor: "#111111",
      tooltipTextColor: "#ffffff",
      tooltipFontSize: 14
    },

    chatWindow: {
      showTitle: true,
      showAgentMessages: true,
      title: "Effecto",
      titleAvatarSrc: "https://i.imgur.com/EfQPrhF.png",
      welcomeMessage: "Hej 👋 Hvordan kan jeg hjælpe dig med SEO og vækst?",
      errorMessage: "Der opstod en fejl. Prøv igen om lidt.",
      backgroundColor: "#ffffff",
      height: 520,
      width: 350,
      fontSize: 15,
      renderHTML: true,
      clearChatOnReload: false,

      starterPrompts: [
        "Hvad kan I hjælpe med?",
        "Kan I forbedre min SEO?",
        "Jeg vil gerne høre mere"
      ],

      starterPromptFontSize: 14,

      botMessage: {
        backgroundColor: "#f5f7fa",
        textColor: "#303235",
        showAvatar: true,
        avatarSrc: "https://i.imgur.com/EfQPrhF.png"
      },

      userMessage: {
        backgroundColor: "#009ee3",
        textColor: "#ffffff",
        showAvatar: false
      },

      textInput: {
        placeholder: "Skriv dit spørgsmål...",
        backgroundColor: "#ffffff",
        textColor: "#303235",
        sendButtonColor: "#009ee3",
        maxChars: 300,
        maxCharsWarningMessage: "Din besked er for lang. Skriv lidt kortere.",
        autoFocus: true
      },

      footer: {
        textColor: "#303235",
        text: "Built by",
        company: "NordAI Agency",
        companyLink: "https://nordaiagency.dk/"
      }
    }
  }
});
</script>

</body>
</html>
